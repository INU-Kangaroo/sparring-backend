spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      username:
      password:
      ssl:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul
  oauth2:
    google:
      client-id: test-google-client-id
      web-client-id: test-google-client-id
      ios-client-id: test-google-client-id
      web-redirect-uri: http://localhost:8080/oauth2/callback/google
      ios-redirect-uri: http://localhost:8080/oauth2/callback/google
      client-secret: test-google-client-secret
      sdk-redirect-uri: http://localhost:8080/oauth2/callback/google
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      token-info-uri: https://oauth2.googleapis.com/tokeninfo
      user-name-attribute: sub
      scope:
        - profile
        - email
    kakao:
      client-id: test-kakao-client-id
      client-secret: test-kakao-client-secret
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
      access-token-info-uri: https://kapi.kakao.com/v1/user/access_token_info
      app-id: test-kakao-app-id
      scope:
        - profile_nickname
        - profile_image
        - account_email
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: test-secret-key-for-ci-testing-at-least-32-characters-long
  access-token-validity: 3600000
  refresh-token-validity: 604800000

cors:
  allowed-origin-patterns:
    - "*"
  allow-credentials: false

gemini:
  api:
    key: test-gemini-key
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

ml:
  server:
    url: http://localhost:8000
    recommend-path: /recommend

report:
  policy:
    blood-sugar-weekly-target: 21
    blood-pressure-weekly-target: 14
    exercise-active-days-target: 5
    full-meal-days-target: 7
    severe-high-blood-sugar: 180
    severe-high-systolic: 160
    severe-high-diastolic: 100
    severe-risk-penalty: 30.0
    variability-penalty-factor: 120.0
    blood-sugar-trend-slope-factor: 4.0
    systolic-trend-slope-factor: 5.0
    diastolic-trend-slope-factor: 7.0
    overall-health-weight: 0.35
    overall-consistency-weight: 0.20
    overall-stability-weight: 0.15
    overall-trend-weight: 0.10
    overall-lifestyle-weight: 0.20
