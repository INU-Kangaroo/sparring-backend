spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

logging:
  level:
    com.kangaroo.sparring: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
